<app-cabecalho 
  [usuarioLogado]="usuarioLogado"
  (onChangePaginaAtual)="onChangePaginaAtual($event)"
  (abrirLoginEvent)="mostrarLogin = true"
  (logoutEvent)="logout()">
</app-cabecalho>


@if(mostrarLogin){
  <app-login (loginSucesso)="onLoginSucesso()"></app-login>
}

@if(paginaAtual=='paginaInicial'){
    <app-pagina-inicial></app-pagina-inicial>
}
@else{
    <app-produtos [filtroProdutos]="paginaAtual"></app-produtos>
}

<app-rodape></app-rodape>
<router-outlet />
