<div class="overlay">

  <div class="modal">
    
    <button class="close-btn" (click)="fechar()">✕</button>

    <h2>Login</h2>

    <form (ngSubmit)="onSubmit()">
      <input 
        type="email" 
        [(ngModel)]="email" 
        name="email"
        placeholder="Email"
        required
      >

      <input 
        type="password" 
        [(ngModel)]="password" 
        name="password"
        placeholder="Senha"
        required
      >

      <button type="submit">Entrar</button>
    </form>

    <p *ngIf="errorMessage" style="color: red; text-align: center;">
      {{ errorMessage }}
    </p>

  </div>

</div>
